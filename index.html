<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unspoken</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Quicksand',sans-serif;
    background:linear-gradient(to bottom,#fff6c7,#ffd6e7);
    overflow-x:hidden;
    color:#5a4a5f;
}

.dark-mode{
    background:linear-gradient(to bottom,#1f1f2e,#2a2235);
    color:white;
}

header{
    text-align:center;
    padding:70px 20px 30px;
}

h1{
    font-size:70px;
    margin:0;
    font-family:'Pacifico',cursive;
    color:#ff7eb6;
    text-shadow:0 0 20px rgba(255,255,255,0.7);
}

.subtitle{
    margin-top:10px;
    font-size:18px;
}

.quote-box{
    text-align:center;
    margin-top:40px;
    font-size:20px;
    min-height:60px;
    padding:0 20px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:50px;
}

.btn{
    background:white;
    border:none;
    padding:16px 28px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
    text-decoration:none;
    color:#5a4a5f;
    font-weight:700;
}

.btn:hover{
    transform:scale(1.05);
}

.toggle{
    position:fixed;
    top:15px;
    right:15px;
    background:white;
    border:none;
    padding:10px 16px;
    border-radius:20px;
    cursor:pointer;
    font-weight:700;
}

.dev-credit{
    position:fixed;
    bottom:70px;
    width:100%;
    text-align:center;
    font-family:'Pacifico',cursive;
    font-size:15px;
    color:#8a6480;
    animation:glow 3s infinite alternate;
}

@keyframes glow{
    from{opacity:0.6;text-shadow:0 0 5px white;}
    to{opacity:1;text-shadow:0 0 15px white;}
}

.bottom-nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:rgba(255,255,255,0.8);
    backdrop-filter:blur(8px);
    padding:15px 0;
}

.bottom-nav a{
    text-decoration:none;
    color:#5a4a5f;
    font-weight:700;
}

.particle{
    position:fixed;
    pointer-events:none;
    animation:float 6s linear infinite;
    opacity:0.7;
}

@keyframes float{
    from{
        transform:translateY(100vh) scale(0.5);
    }
    to{
        transform:translateY(-120vh) scale(1.2);
    }
}

</style>
</head>
<body>

<button class="toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>

<header>
    <h1>Unspoken</h1>
    <div class="subtitle">A comforting anonymous space to share what’s on your heart 💛</div>
</header>

<div class="quote-box" id="quote"></div>

<div class="buttons">
    <a class="btn" href="submit.html">✍️ Write</a>
    <a class="btn" href="messages.html">📖 Journal Feed</a>
</div>

<div class="dev-credit">💫 Made with care by Dai</div>

<div class="bottom-nav">
    <a href="index.html">🏠 Home</a>
    <a href="submit.html">✍️ Write</a>
    <a href="messages.html">📖 Feed</a>
</div>

<script>

const quotes = [
"You are never alone 💛",
"Your feelings matter.",
"It’s okay to rest.",
"Someone out there understands.",
"You deserve kindness.",
"Healing takes time 🌸",
"You are more loved than you realize.",
"One step at a time.",
"Your voice matters.",
"Take a deep breath. You made it this far."
];

let quoteIndex = 0;
let charIndex = 0;

function typeQuote(){

    let current = quotes[quoteIndex];

    if(charIndex < current.length){
        document.getElementById("quote").innerHTML += current.charAt(charIndex);
        charIndex++;
        setTimeout(typeQuote,90);
    }
    else{
        setTimeout(nextQuote,3000);
    }
}

function nextQuote(){
    document.getElementById("quote").innerHTML="";
    charIndex=0;
    quoteIndex=(quoteIndex+1)%quotes.length;
    typeQuote();
}

typeQuote();

function toggleDarkMode(){
    document.body.classList.toggle("dark-mode");
}

function createParticle(){

    const particle = document.createElement("div");

    const emojis = ["💖","🌸","✨","💛","🫶"];

    particle.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];

    particle.classList.add("particle");

    particle.style.left = Math.random()*100 + "vw";
    particle.style.fontSize = (20 + Math.random()*20) + "px";

    document.body.appendChild(particle);

    setTimeout(()=>{
        particle.remove();
    },6000);
}

setInterval(createParticle,700);

window.addEventListener("click", function(e){

    const heart = document.createElement("div");
    heart.innerHTML = "💖";
    heart.style.position = "fixed";
    heart.style.left = e.clientX + "px";
    heart.style.top = e.clientY + "px";
    heart.style.pointerEvents = "none";
    heart.style.animation = "float 2s linear forwards";
    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },2000);

});

</script>

</body>
</html>
